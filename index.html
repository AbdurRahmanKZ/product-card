<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог товаров</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1 class="main-title">Выбери свой продукт</h1>
  <button id="button-color-toggle-button">Покрась этот заголовок в красный цвет</button>
  <main class="page">
    <div class="catalog">
      <template id="product-card-template">
        <section class="card">
          <img class="card__image" src="" alt="">
          <p class="card__spec"></p>
          <h3 class="card__name"></h3>
          <p class="card__description"></p>
          <p class="card__list-header">Состав:</p>
          <ul class="card__list"></ul>
          <div class="card-price">
            <span class="card-price__leftside">Цена:</span>
            <span class="card-price__rightside"></span>
          </div>
        </section>
      </template>
    </div>
  </main>
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-about-container">
        <h3 class="footer-about-title">Product Cards</h3>
        <p class="footer-about-text">У нас самые лучшие продукты для кожи!</p>
        <a href="https://web.telegram.org" target="_blank"><img class="footer-about-tg-icon"
            src="./images/telegram-icon.png" alt="telegram-icon"></a>
        <a href="https://vk.com/" target="_blank"><img class="footer-about-vk-icon" src="./images/vk-icon.png"
            alt="vk-icon" href="vk.com"></a>
      </div>
      <div class="footer-subscribe-container">
        <h3 class="footer-subscribe-title">Подпишись на наши акции:</h3>
        <form class="footer-subscribe-form">
          <input class="footer-subscribe-input" type="email" id="footer-email-input" name="userEmail"
            placeholder="Введи Email..." required>
          <hr class="footer-subscribe-line">
          <button class="footer-subscribe-input-button">Подписаться</button>
        </form>
      </div>
      <nav class="footer-nav">
        <h3 class="footer-nav-title">Быстрые ссылки</h3>
        <ul class="footer-nav-ul">
          <a href="" class="footer-nav-link">Главная</a>
          <a href="" class="footer-nav-link">Магазин</a>
          <a href="" class="footer-nav-link">Контакты</a>
        </ul>
      </nav>
    </div>
    <hr class="footer-bottom-line">
    <a class="footer-bottom-link">www.product-cards.com©all right reserve</p>
  </footer>
  <div class="overlay"></div>
  <button class="register-button">Регистрация</button>
  <div class="modal">
    <div class="close-register-button">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <h3 class="modal-title">Регистрация</h3>
    <form class="modal-form">
      <label class="modal-label">
        Имя:
      </label>
      <input class="modal-input" name="name" type="text" id="form-name" placeholder="введи имя" required>
      <label class="modal-label">
        Фамилия:
      </label>
      <input class="modal-input" name="surname" type="text" id="form-surname" placeholder="введи фамилию" required>
      <label class="modal-label">
        Дата Рождения:
      </label>
      <input class="modal-input" name="birthdate" type="date" min="1940-01-01" id="form-birthdate" placeholder="введи дату рождения" required>
      <label class="modal-label">
        Логин:
      </label>
      <input class="modal-input" name="login" type="name" id="form-login" placeholder="введи логин" required>
      <label class="modal-label">
        Пароль:
      </label>
      <input class="modal-input" name="password" type="name" id="form-password" placeholder="введи пароль" required>
      <label class="modal-label">
        Повторение пароля:
      </label>
      <input class="modal-input" name="repeatPassword" type="name" id="form-repeat-password" placeholder="введи повтор пороля" required>
      <button class="form-button">Зарегестрироваться</button>
    </form>
  </div>
  <img src="images/background-flower.png" alt="background-flower" class="background">
  <script src="./script.js"></script>
  <script src="./homework-5.js"></script>
  <script src="./homework-6.js"></script>
  <script src="./homework-7.js" type="module"></script>
  <script src="./homework-8.js" type="module"></script>
  <script src="./homework-9.js" type="module"></script>
</body>

</html>
