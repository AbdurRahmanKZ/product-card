<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <p class="status">Данные загружаются</p>
  <div class="users-catalog"></div>
  <template id="users-catalog">
    <div class="card">
      <p class="user-id"></p>
      <p class="user-name"></p>
      <p class="user-surname"></p>
      <p class="user-email"></p>
      <p class="user-age"></p>
    </div>
  </template>
  <div class="button-panel">
    <button class="button" id="delete-all-button">Удалить все карточки</button>
    <div>
      <button class="button" id="delete-chosen-button">Удалить выбранную карточку</button>
      <input class="button" type="text" id="delete-chosen-input" placeholder="№ карточки">
    </div>
    <button class="button" id="get-all-button">Получить все карточки</button>
  </div>
  <script src="async.js"></script>
</body>
</html>
